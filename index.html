<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하나 통합관제 및 데이터 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        .nav-group-title { padding: 1.5rem 1rem 0.5rem 1.5rem; font-size: 0.7rem; font-weight: 800; color: #64748b; letter-spacing: -0.02em; }
        .nav-item { display: flex; align-items: center; padding: 0.5rem 1.5rem; color: #334155; font-size: 0.85rem; font-weight: 600; transition: background-color 0.15s; border-left: 3px solid transparent; cursor: pointer; letter-spacing: -0.01em; }
        .nav-item i { width: 1.25rem; font-size: 0.9rem; color: #94a3b8; margin-right: 0.5rem; text-align: center; }
        .nav-item:hover { background-color: #f1f5f9; color: #0f172a; }
        .nav-item.active { background-color: #eff6ff; color: #2563eb; border-left-color: #2563eb; font-weight: 700; }
        .nav-item.active i { color: #2563eb; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full z-20 shrink-0 shadow-sm">
        <div class="h-14 flex items-center px-5 border-b border-slate-200">
            <div class="w-6 h-6 rounded bg-teal-600 flex items-center justify-center mr-2.5">
                <i class="fa-solid fa-building-columns text-white text-[10px]"></i>
            </div>
            <span class="font-bold text-[15px] tracking-tight text-slate-900">통합관제센터</span>
        </div>

        <nav class="flex-1 overflow-y-auto pb-6">
            <div class="nav-group-title">시스템 관제 (Monitoring)</div>
            <a onclick="app.loadView('dashboard', this)" class="nav-item active" data-menu><i class="fa-solid fa-table-cells-large"></i>대시보드 총괄표</a>
            <a onclick="app.loadView('pcStatus', this)" class="nav-item" data-menu><i class="fa-solid fa-server"></i>단말 상태 관제</a>
            <a onclick="app.loadView('flagHistory', this)" class="nav-item" data-menu><i class="fa-solid fa-list-check"></i>시스템 수신 이력</a>
            <a onclick="app.loadView('groupManage', this)" class="nav-item" data-menu><i class="fa-solid fa-users-gear"></i>고객사 등급 관리</a>
            <a onclick="app.loadView('reportView', this)" class="nav-item" data-menu><i class="fa-solid fa-file-pdf"></i>운영 보고서 (Report)</a>

            <div class="nav-group-title">데이터 활용 (Data Insights)</div>
            <a onclick="app.loadView('assetView', this)" class="nav-item" data-menu><i class="fa-solid fa-coins"></i>금융자산 점유 현황</a>
            <a onclick="app.loadView('b2bView', this)" class="nav-item" data-menu><i class="fa-solid fa-file-invoice-dollar"></i>전자어음 및 B2B 거래</a>
            <a onclick="app.loadView('cardView', this)" class="nav-item" data-menu><i class="fa-regular fa-credit-card"></i>법인카드 사용 분석</a>
            <a onclick="app.loadView('taxView', this)" class="nav-item" data-menu><i class="fa-solid fa-receipt"></i>전자세금계산서</a>

            <div class="nav-group-title">환경 설정 (Configuration)</div>
            <a onclick="app.loadView('settings', this)" class="nav-item" data-menu><i class="fa-solid fa-sliders"></i>모니터링 정책 설정</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-10 shrink-0 shadow-sm">
            <h1 id="page-title" class="text-[15px] font-bold text-slate-800">대시보드 총괄표</h1>
            
            <div class="flex items-center space-x-4">
                <div class="text-[12px] text-slate-500 font-medium mr-2">최근 업데이트: <span class="text-teal-600 font-bold">오늘 14:32</span></div>
                <button class="text-slate-400 hover:text-slate-600 transition relative">
                    <i class="fa-regular fa-bell text-lg"></i>
                </button>
                <div class="h-4 w-px bg-slate-200"></div>
                <div class="flex items-center space-x-2 cursor-pointer">
                    <div class="w-7 h-7 rounded-full bg-slate-100 border border-slate-300 flex items-center justify-center text-xs font-bold text-slate-500">운</div>
                    <span class="text-xs font-bold text-slate-600 hidden sm:block">운영관리자</span>
                </div>
            </div>
        </header>

        <main id="app-view" class="flex-1 overflow-x-hidden overflow-y-auto p-6 bg-[#f8fafc]"></main>
    </div>

    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/control.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
